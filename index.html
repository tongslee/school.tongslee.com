<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel's School Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary: #4f46e5;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    .header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }
    
    .header-actions {
      display: flex;
      gap: 0.5rem;
    }
    
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    
    .btn-primary:hover {
      background: #4338ca;
    }
    
    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }
    
    .btn-secondary:hover {
      background: #cbd5e1;
    }
    
    .legend {
      display: flex;
      gap: 1rem;
      font-size: 0.75rem;
      color: var(--text-light);
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .dashboard {
      padding: 1.5rem;
      overflow-x: auto;
    }
    
    .weeks-container {
      display: flex;
      gap: 1rem;
      padding-bottom: 1rem;
    }
    
    .week-column {
      min-width: 320px;
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }
    
    .week-column.current {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
    }
    
    .week-header {
      padding: 1rem;
      background: #f1f5f9;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    
    .week-header:hover {
      background: #e2e8f0;
    }
    
    .week-title {
      font-weight: 600;
      font-size: 0.9rem;
    }
    
    .week-term {
      font-size: 0.75rem;
      color: var(--text-light);
    }
    
    .week-toggle {
      font-size: 1.25rem;
      color: var(--text-light);
      transition: transform 0.2s;
    }
    
    .week-column.collapsed .week-toggle {
      transform: rotate(-90deg);
    }
    
    .week-column.collapsed .week-content {
      display: none;
    }
    
    .week-content {
      padding: 0.75rem;
    }
    
    .subject-row {
      margin-bottom: 0.75rem;
    }
    
    .subject-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      border-radius: 6px;
      cursor: pointer;
    }
    
    .subject-header:hover {
      background: #f8fafc;
    }
    
    .subject-color {
      width: 4px;
      height: 24px;
      border-radius: 2px;
    }
    
    .subject-name {
      font-weight: 500;
      font-size: 0.875rem;
      flex: 1;
    }
    
    .subject-count {
      font-size: 0.75rem;
      color: var(--text-light);
      background: var(--border);
      padding: 0.125rem 0.5rem;
      border-radius: 999px;
    }
    
    .assignments-list {
      margin-left: 1rem;
      padding-left: 0.5rem;
      border-left: 1px solid var(--border);
      display: none;
    }
    
    .subject-row.expanded .assignments-list {
      display: block;
    }
    
    .assignment {
      padding: 0.5rem;
      margin-bottom: 0.5rem;
      background: #f8fafc;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    
    .assignment-title {
      font-weight: 500;
      margin-bottom: 0.25rem;
    }
    
    .assignment-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      font-size: 0.7rem;
      color: var(--text-light);
    }
    
    .assignment-type {
      padding: 0.125rem 0.375rem;
      border-radius: 4px;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.65rem;
    }
    
    .type-formative { background: #dbeafe; color: #1d4ed8; }
    .type-summative { background: #fce7f3; color: #be185d; }
    .type-project { background: #fef3c7; color: #b45309; }
    .type-homework { background: #d1fae5; color: #047857; }
    .type-test { background: #fee2e2; color: #b91c1c; }
    .type-other { background: #f1f5f9; color: #64748b; }
    
    .status-pending { color: var(--warning); }
    .status-submitted { color: var(--info); }
    .status-graded { color: var(--success); }
    .status-missing { color: var(--danger); }
    
    .due-date {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    
    .empty-week {
      text-align: center;
      padding: 2rem;
      color: var(--text-light);
      font-size: 0.875rem;
    }
    
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-light);
    }
    
    .last-updated {
      font-size: 0.75rem;
      color: var(--text-light);
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>📚 Daniel's School Dashboard</h1>
      <p class="last-updated" id="lastUpdated"></p>
    </div>
    <div class="header-actions">
      <div class="legend">
        <div class="legend-item"><span class="legend-dot" style="background: #3b82f6;"></span>Formative</div>
        <div class="legend-item"><span class="legend-dot" style="background: #ec4899;"></span>Summative</div>
        <div class="legend-item"><span class="legend-dot" style="background: #f59e0b;"></span>Project</div>
        <div class="legend-item"><span class="legend-dot" style="background: #22c55e;"></span>Homework</div>
      </div>
      <button class="btn btn-secondary" onclick="toggleAllWeeks()">Toggle All</button>
      <button class="btn btn-primary" onclick="refreshData()">Refresh</button>
    </div>
  </div>
  
  <div class="dashboard">
    <div class="weeks-container" id="weeksContainer">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script>
    let weeksData = [];
    let subjectsData = [];
    let assignmentsData = [];
    
    async function fetchData() {
      const [weeksRes, subjectsRes, assignmentsRes] = await Promise.all([
        fetch('/api/weeks'),
        fetch('/api/subjects'),
        fetch('/api/assignments')
      ]);
      
      const weeksText = await weeksRes.text();
      const subjectsText = await subjectsRes.text();
      const assignmentsText = await assignmentsRes.text();
      
      weeksData = parsePSQL(weeksText);
      subjectsData = parsePSQL(subjectsText);
      assignmentsData = parsePSQL(assignmentsText);
      
      document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleString()}`;
      
      renderDashboard();
    }
    
    function parsePSQL(text) {
      if (!text || !text.trim()) return [];
      return text.split('\n')
        .map(line => line.trim())
        .filter(line => line)
        .map(line => {
          const parts = line.split('|').map(p => p.trim());
          return parts;
        });
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    
    function getWeekRange(weekStart, weekEnd) {
      const start = new Date(weekStart);
      const end = new Date(weekEnd);
      const startStr = start.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const endStr = end.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      return `${startStr} - ${endStr}`;
    }
    
    function getAssignmentTypeClass(type) {
      const typeMap = {
        'formative': 'type-formative',
        'summative': 'type-summative',
        'project': 'type-project',
        'homework': 'type-homework',
        'test': 'type-test',
        'other': 'type-other'
      };
      return typeMap[type] || 'type-other';
    }
    
    function getStatusClass(status) {
      return `status-${status}`;
    }
    
    function renderDashboard() {
      const container = document.getElementById('weeksContainer');
      container.innerHTML = '';
      
      // Group assignments by week and subject
      const weekMap = new Map();
      const subjectMap = new Map();
      
      assignmentsData.forEach(row => {
        if (row.length < 10) return;
        const [id, title, type, dueDate, status, subjectId, subjectName, color, weekId, weekStart, weekEnd] = row;
        
        if (!weekMap.has(weekId)) {
          weekMap.set(weekId, {
            id: weekId,
            weekStart,
            weekEnd,
            subjects: new Map()
          });
        }
        
        const week = weekMap.get(weekId);
        if (!week.subjects.has(subjectId)) {
          week.subjects.set(subjectId, {
            id: subjectId,
            name: subjectName,
            color: color,
            assignments: []
          });
        }
        
        week.subjects.get(subjectId).assignments.push({
          id,
          title,
          type,
          dueDate,
          status
        });
      });
      
      // Render weeks
      weeksData.forEach(row => {
        if (row.length < 5) return;
        const [id, weekStart, weekEnd, term, isCurrent] = row;
        
        const week = weekMap.get(id);
        const isCollapsed = isCurrent !== 'true' && isCurrent !== true;
        
        const weekEl = document.createElement('div');
        weekEl.className = `week-column ${isCurrent === 'true' || isCurrent === true ? 'current' : ''} ${isCollapsed ? 'collapsed' : ''}`;
        
        let subjectsHtml = '';
        if (week && week.subjects.size > 0) {
          week.subjects.forEach(subject => {
            const assignmentsHtml = subject.assignments.map(a => `
              <div class="assignment">
                <div class="assignment-title">${a.title}</div>
                <div class="assignment-meta">
                  <span class="assignment-type ${getAssignmentTypeClass(a.type)}">${a.type}</span>
                  ${a.dueDate ? `<span class="due-date">📅 ${formatDate(a.dueDate)}</span>` : ''}
                  <span class="${getStatusClass(a.status)}">● ${a.status}</span>
                </div>
              </div>
            `).join('');
            
            subjectsHtml += `
              <div class="subject-row" onclick="toggleSubject(this)">
                <div class="subject-header">
                  <div class="subject-color" style="background: ${subject.color}"></div>
                  <span class="subject-name">${subject.name}</span>
                  <span class="subject-count">${subject.assignments.length}</span>
                </div>
                <div class="assignments-list">
                  ${assignmentsHtml}
                </div>
              </div>
            `;
          });
        } else {
          subjectsHtml = '<div class="empty-week">No assignments</div>';
        }
        
        weekEl.innerHTML = `
          <div class="week-header" onclick="toggleWeek(this.parentElement)">
            <div>
              <div class="week-title">${getWeekRange(weekStart, weekEnd)}</div>
              <div class="week-term">${term}</div>
            </div>
            <span class="week-toggle">▼</span>
          </div>
          <div class="week-content">
            ${subjectsHtml}
          </div>
        `;
        
        container.appendChild(weekEl);
      });
    }
    
    function toggleWeek(weekEl) {
      weekEl.classList.toggle('collapsed');
    }
    
    function toggleSubject(subjectEl) {
      subjectEl.classList.toggle('expanded');
    }
    
    function toggleAllWeeks() {
      document.querySelectorAll('.week-column').forEach(el => {
        el.classList.toggle('collapsed');
      });
    }
    
    async function refreshData() {
      const btn = document.querySelector('.btn-primary');
      btn.textContent = 'Refreshing...';
      btn.disabled = true;
      
      await fetchData();
      
      btn.textContent = 'Refresh';
      btn.disabled = false;
    }
    
    // Auto-refresh every 5 hours
    setInterval(refreshData, 5 * 60 * 60 * 1000);
    
    // Initial load
    fetchData();
  </script>
</body>
</html>
