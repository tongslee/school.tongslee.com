<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Daniel's School Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #4f46e5;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 1.5rem; font-weight: 600; }
    .header-actions { display: flex; gap: 0.5rem; align-items: center; }
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .legend { display: flex; gap: 1rem; font-size: 0.75rem; color: var(--text-light); }
    .legend-item { display: flex; align-items: center; gap: 0.25rem; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .dashboard { padding: 1.5rem; }
    .weeks-container {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding-bottom: 1rem;
    }
    .week-column {
      min-width: 340px;
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .week-column.current { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2); }
    .week-header {
      padding: 1rem;
      background: #f1f5f9;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 12px 12px 0 0;
    }
    .week-header:hover { background: #e2e8f0; }
    .week-title { font-weight: 600; font-size: 0.9rem; }
    .week-term { font-size: 0.75rem; color: var(--text-light); }
    .week-toggle { font-size: 1.25rem; color: var(--text-light); transition: transform 0.2s; }
    .week-column.collapsed .week-toggle { transform: rotate(-90deg); }
    .week-column.collapsed { 
      background: transparent !important; 
      border: none !important;
      box-shadow: none !important;
      width: auto;
      min-width: auto;
    }
    .week-column.collapsed > .week-content { display: none !important; }
    .week-column.collapsed .week-header {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.5rem 1rem;
      display: inline-flex;
    }
    .week-content { padding: 0.75rem; }
    .subject-row { margin-bottom: 0.75rem; }
    .subject-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      border-radius: 6px;
      cursor: pointer;
    }
    .subject-header:hover { background: #f8fafc; }
    .subject-color { width: 4px; height: 24px; border-radius: 2px; }
    .subject-name { font-weight: 500; font-size: 0.875rem; flex: 1; }
    .subject-count { font-size: 0.75rem; color: var(--text-light); background: var(--border); padding: 0.125rem 0.5rem; border-radius: 999px; }
    .assignments-list { margin-left: 1rem; padding-left: 0.5rem; border-left: 1px solid var(--border); display: none; }
    .subject-row.expanded .assignments-list { display: block; }
    .assignment { padding: 0.5rem; margin-bottom: 0.5rem; background: #f8fafc; border-radius: 6px; font-size: 0.8rem; }
    .assignment-title { font-weight: 500; margin-bottom: 0.25rem; }
    .assignment-meta { display: flex; gap: 0.5rem; align-items: center; font-size: 0.7rem; color: var(--text-light); flex-wrap: wrap; }
    .assignment-type { padding: 0.125rem 0.375rem; border-radius: 4px; font-weight: 500; text-transform: uppercase; font-size: 0.65rem; }
    .type-formative { background: #dbeafe; color: #1d4ed8; }
    .type-summative { background: #fce7f3; color: #be185d; }
    .type-project { background: #fef3c7; color: #b45309; }
    .type-homework { background: #d1fae5; color: #047857; }
    .type-test { background: #fee2e2; color: #b91c1c; }
    .type-other { background: #f1f5f9; color: #64748b; }
    .status-pending { color: var(--warning); }
    .status-submitted { color: var(--info); }
    .status-graded { color: var(--success); }
    .status-missing { color: var(--danger); }
    .due-date { display: flex; align-items: center; gap: 0.25rem; }
    .empty-week { text-align: center; padding: 2rem; color: var(--text-light); font-size: 0.875rem; }
    .loading { text-align: center; padding: 3rem; color: var(--text-light); }
    .last-updated { font-size: 0.75rem; color: var(--text-light); }
    @media print {
      .header-actions { display: none; }
      .weeks-container { overflow: visible; flex-wrap: wrap; }
      .week-column { min-width: 100%; margin-bottom: 1rem; }
    }
    
    /* Mobile styles */
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }
      .header h1 { font-size: 1.25rem; }
      .header-actions {
        flex-wrap: wrap;
        justify-content: center;
      }
      .legend { display: none; }
      .dashboard { padding: 0.75rem; }
      .weeks-container {
        flex-direction: column;
        gap: 0.75rem;
      }
      .week-column {
        min-width: 100%;
        width: 100%;
      }
      .week-column.collapsed {
        min-width: auto;
        width: auto;
      }
      .week-column.collapsed .week-header {
        padding: 0.5rem 1rem;
      }
      .week-title { font-size: 0.8rem; }
      .week-term { font-size: 0.65rem; }
      .subject-name { font-size: 0.8rem; }
      .assignment { padding: 0.4rem; }
      .assignment-title { font-size: 0.75rem; }
      .assignment-meta { font-size: 0.65rem; }
    }
  </style>
</head>
<body>

      <p class="last-updated" id="lastUpdated"></p>
    </div>
    <div class="header-actions">

        <div class="legend-item"><span class="legend-dot" style="background: #22c55e;"></span>Homework</div>
      </div>
      <button class="btn btn-secondary" onclick="goToToday()">Today</button>
      <button class="btn btn-secondary" onclick="toggleAllWeeks()">Toggle All</button>
      <button class="btn btn-primary" onclick="window.print()">Print</button>
    </div>
  </div>

        {"id":16,"subject_id":9,"week_id":29,"title":"生活中最快乐的事情。","assignment_type":"formative","due_date":"2026-02-27T23:59:00","status":"pending"}

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }
    
    function getWeekRange(weekStart, weekEnd) {
      const start = new Date(weekStart);
      const end = new Date(weekEnd);
      const startStr = start.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const endStr = end.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      return `${startStr} - ${endStr}`;
    }
    
    function getAssignmentTypeClass(type) {
      const typeMap = {
        'formative': 'type-formative',
        'summative': 'type-summative',
        'project': 'type-project',
        'homework': 'type-homework',
        'test': 'type-test',
        'other': 'type-other'
      };
      return typeMap[type] || 'type-other';
    }
    
    function getStatusClass(status) {
      return `status-${status}`;
    }
    
    function renderDashboard() {
      const container = document.getElementById('weeksContainer');
      container.innerHTML = '';
      
      const weekMap = new Map();
      
      // Group assignments by week and subject
      DATA.assignments.forEach(a => {
        if (!weekMap.has(a.week_id)) {
          weekMap.set(a.week_id, { subjects: new Map() });
        }
        const week = weekMap.get(a.week_id);
        const subject = DATA.subjects.find(s => s.id === a.subject_id);
        if (!subject) return;
        
        if (!week.subjects.has(subject.id)) {
          week.subjects.set(subject.id, {
            id: subject.id,
            name: subject.display_name,
            color: subject.color,
            assignments: []
          });
        }
        week.subjects.get(subject.id).assignments.push(a);
      });

      // Find current week and weeks with data
      const currentWeekId = DATA.weeks.find(w => w.is_current)?.id;
      const weeksWithData = new Set(DATA.assignments.map(a => a.week_id));

      // Render weeks
      DATA.weeks.forEach(week => {
        const weekData = weekMap.get(week.id);
        const isCurrentWeek = week.id === currentWeekId;
        const hasData = weeksWithData.has(week.id);
        // Expand current week and any future weeks with data
        const isExpanded = isCurrentWeek || (hasData && week.id > currentWeekId);
        const isCollapsed = !isExpanded;
        
        const weekEl = document.createElement('div');
        weekEl.className = `week-column ${isCurrentWeek ? 'current' : ''} ${isCollapsed ? 'collapsed' : ''}`;
        if (isCurrentWeek) {
          weekEl.id = 'current-week';
        }
        
        let subjectsHtml = '';
        if (weekData && weekData.subjects.size > 0) {
          weekData.subjects.forEach(subject => {
            const assignmentsHtml = subject.assignments.map(a => `
              <div class="assignment">
                <div class="assignment-title">${a.title}</div>
                <div class="assignment-meta">
                  <span class="assignment-type ${getAssignmentTypeClass(a.assignment_type)}">${a.assignment_type}</span>
                  ${a.due_date ? `<span class="due-date">📅 ${formatDate(a.due_date)}</span>` : ''}
                  <span class="${getStatusClass(a.status)}">● ${a.status}</span>
                </div>
              </div>
            `).join('');
            
            subjectsHtml += `
              <div class="subject-row ${isExpanded ? 'expanded' : ''}" onclick="toggleSubject(event)">
                <div class="subject-header">
                  <div class="subject-color" style="background: ${subject.color}"></div>
                  <span class="subject-name">${subject.name}</span>
                  <span class="subject-count">${subject.assignments.length}</span>
                </div>
                <div class="assignments-list">
                  ${assignmentsHtml}
                </div>
              </div>
            `;
          });
        } else {
          subjectsHtml = '<div class="empty-week">No assignments</div>';
        }
        
        weekEl.innerHTML = `
          <div class="week-header" onclick="toggleWeek(event)">
            <div>
              <div class="week-title">${getWeekRange(week.week_start, week.week_end)}</div>
              <div class="week-term">${week.term}</div>
            </div>
            <span class="week-toggle">▼</span>
          </div>
          <div class="week-content">
            ${subjectsHtml}
          </div>
        `;
        
        container.appendChild(weekEl);
      });
      
      document.getElementById('lastUpdated').textContent = 'Last updated: Feb 25, 2026';
    }
    
    function toggleWeek(event) {
      const weekEl = event.target.closest('.week-column');
      if (weekEl) {
        // Toggle the collapsed class
        weekEl.classList.toggle('collapsed');
        
        // Update the toggle icon
        const toggle = weekEl.querySelector('.week-toggle');
        if (toggle) {
          toggle.textContent = weekEl.classList.contains('collapsed') ? '▶' : '▼';
        }
        
        event.stopPropagation();
      }
    }
    
    function toggleSubject(event) {
      const subjectEl = event.target.closest('.subject-row');
      if (subjectEl) {
        subjectEl.classList.toggle('expanded');
        event.stopPropagation();
      }
    }
    
    function toggleAllWeeks() {
      document.querySelectorAll('.week-column').forEach(el => {
        el.classList.toggle('collapsed');
      });
    }
    
    function goToToday() {
      const currentWeekEl = document.getElementById('current-week');
      if (currentWeekEl) {
        // Expand the week if collapsed
        currentWeekEl.classList.remove('collapsed');
        const toggle = currentWeekEl.querySelector('.week-toggle');
        if (toggle) {
          toggle.textContent = '▼';
        }
        
        currentWeekEl.scrollIntoView({ behavior: 'smooth', inline: 'center' });
      }
    }
    
    // Initial render
    renderDashboard();
    
    // Scroll to current week
    setTimeout(() => {
      const currentWeekEl = document.getElementById('current-week');
      if (currentWeekEl) {
        currentWeekEl.scrollIntoView({ behavior: 'smooth', inline: 'start' });
      }
    }, 100);
